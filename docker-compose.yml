services:

  backend:
    build:
      context: ./backend
    container_name: url-shortener-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis  


  frontend:
      build: ./frontend
      ports:
        - "5173:5173"
      volumes:
        - ./frontend:/app
        - /app/node_modules
      environment:
        VITE_API_URL: http://localhost:8000
      depends_on:
        - backend    


  db:
    image: postgres:16
    container_name: url-shortener-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener
    ports:
      - "5432:5432"    
    volumes:
      - postgres_data:/var/lib/postgresql/data  

  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis

    ports:
      - "6379:6379"

    restart: unless-stopped      

volumes:
  postgres_data:      